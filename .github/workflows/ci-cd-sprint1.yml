name: CI/CD Sprint 1 - Calculadora de Resistencias

on:
  push:
    branches:
      - develop
      - release/sprint-1
      - main

  pull_request:
    branches:
      - develop
      - main

jobs:
  validar-y-empaquetar:
    name: Validar y empaquetar aplicacion web
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Verificar archivos del proyecto
        run: ls -la

      - name: Validar existencia de index.html
        run: test -f index.html

      - name: Validar existencia de app.js
        run: test -f app.js

      - name: Validar existencia de style.css
        run: test -f style.css

      - name: Crear carpeta de despliegue
        run: mkdir dist

      - name: Copiar archivos para despliegue
        run: |
          cp index.html dist/
          cp app.js dist/
          cp style.css dist/
          cp README.md dist/ || true

      - name: Guardar artefacto generado
        uses: actions/upload-artifact@v4
        with:
          name: calculadora-resistencias-sprint1
          path: dist/