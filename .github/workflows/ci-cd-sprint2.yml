name: CI/CD Sprint 2 - Calculadora de Resistencias

on:
  push:
    branches:
      - develop
      - CDR-4
      - CDR-5
      - CDR-32
      - CDR-33
      - release/sprint-2
      - main

  pull_request:
    branches:
      - develop
      - main

jobs:
  validar-y-empaquetar:
    name: Validar y empaquetar aplicacion web Sprint 2
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Verificar archivos del proyecto
        run: ls -la

      - name: Validar existencia de index.html
        run: test -f index.html

      - name: Validar existencia de app.js
        run: test -f app.js

      - name: Validar existencia de style.css
        run: test -f style.css

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validar sintaxis de app.js
        run: node --check app.js

      - name: Validar selector de tolerancia HU-04
        run: grep -Ei "band5|Tolerancia|tol" app.js index.html

      - name: Validar calculo con tolerancia HU-04
        run: grep -Ei "tolerance|tolerancia|tol|±" app.js index.html

      - name: Validar mensaje de campos obligatorios HU-05
        run: grep -Ei "Debe seleccionar todas las bandas|error-message|campos obligatorios" app.js index.html

      - name: Validar funcion de formulario HU-05
        run: grep -Ei "validateForm|showError|hideError" app.js

      - name: Validar boton calcular
        run: grep -Ei "btn-calculate|calculateResistance" app.js index.html

      - name: Validar boton limpiar
        run: grep -Ei "btn-clear|clearForm" app.js index.html

      - name: Crear carpeta de despliegue
        run: mkdir dist

      - name: Copiar archivos para despliegue
        run: |
          cp index.html dist/
          cp app.js dist/
          cp style.css dist/
          cp README.md dist/ || true

      - name: Guardar artefacto generado
        uses: actions/upload-artifact@v4
        with:
          name: calculadora-resistencias-sprint2
          path: dist/