name: CI/CD Sprint 4 - Calculadora de Resistencias

on:
  push:
    branches:
      - develop
      - CDR-8
      - CDR-9
      - CDR-10
      - CDR-34
      - CDR-35
      - release/sprint-4
      - main

  pull_request:
    branches:
      - develop
      - main

jobs:
  validar-y-empaquetar:
    name: Validar y empaquetar aplicacion web Sprint 4
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Verificar archivos del proyecto
        run: ls -la

      - name: Validar existencia de index.html
        run: test -f index.html

      - name: Validar existencia de app.js
        run: test -f app.js

      - name: Validar existencia de style.css
        run: test -f style.css

      - name: Validar HU-08 historial de calculos
        run: grep -Ei "history|historial|historyArr|renderHistory|addToHistory|clearHistory" app.js

      - name: Validar HU-09 copiar resultado
        run: grep -Ei "clipboard|writeText|copyResult|copiar|copy" app.js

      - name: Validar HU-10 diseno responsive
        run: grep -Ei "@media|max-width|min-width|Responsive|responsive" style.css

      - name: Crear carpeta de despliegue
        run: mkdir dist

      - name: Copiar archivos para despliegue
        run: |
          cp index.html dist/
          cp app.js dist/
          cp style.css dist/
          cp README.md dist/ || true

      - name: Guardar artefacto generado
        uses: actions/upload-artifact@v4
        with:
          name: calculadora-resistencias-sprint4
          path: dist/