<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Resistencias</title>
    <meta name="description" content="Calculadora interactiva para el código de colores de resistencias eléctricas">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Toast Notificationnn -->
        <div id="toast" class="toast hidden">¡Copiado con éxito!</div>

        <header>
            <h1>Calculadora de Resistencias</h1>
            <div class="mode-toggle">
                <input type="radio" id="mode4" name="bandMode" value="4" checked>
                <label for="mode4">4 Bandas</label>
                <input type="radio" id="mode5" name="bandMode" value="5">
                <label for="mode5">5 Bandas</label>
            </div>
        </header>

        <main class="main-content">
            <!-- Left Column: Form and Result -->
            <section class="calculator-section glass-panel">
                <div id="error-message" class="error-message hidden">Debe seleccionar todas las bandas</div>
                
                <form id="resistor-form">
                    <div class="band-group">
                        <label for="band1">Banda 1 (1ra Cifra)</label>
                        <select id="band1" class="color-select" required>
                            <option value="" disabled selected>Seleccione...</option>
                        </select>
                    </div>

                    <div class="band-group">
                        <label for="band2">Banda 2 (2da Cifra)</label>
                        <select id="band2" class="color-select" required>
                            <option value="" disabled selected>Seleccione...</option>
                        </select>
                    </div>

                    <div class="band-group" id="band3-container" style="display: none;">
                        <label for="band3">Banda 3 (3ra Cifra)</label>
                        <select id="band3" class="color-select">
                            <option value="" disabled selected>Seleccione...</option>
                        </select>
                    </div>

                    <div class="band-group">
                        <label for="band4">Multiplicador</label>
                        <select id="band4" class="color-select" required>
                            <option value="" disabled selected>Seleccione...</option>
                        </select>
                    </div>

                    <div class="band-group">
                        <label for="band5">Tolerancia</label>
                        <select id="band5" class="color-select" required>
                            <option value="" disabled selected>Seleccione...</option>
                        </select>
                    </div>
                </form>

                <div class="result-display">
                    <div class="result-value" id="result-value">--</div>
                </div>

                <div class="action-buttons">
                    <button type="button" id="btn-calculate" class="btn btn-primary">Calcular</button>
                    <button type="button" id="btn-clear" class="btn btn-secondary">Limpiar</button>
                    <button type="button" id="btn-copy" class="btn btn-outline">Copiar</button>
                </div>
            </section>

            <!-- Right Column: Table and History -->
            <aside class="sidebar">
                <section class="table-section glass-panel">
                    <h2>Código de Colores</h2>
                    <div class="table-wrapper">
                        <table id="reference-table">
                            <thead>
                                <tr>
                                    <th>Color</th>
                                    <th>Valor</th>
                                    <th>Multiplicador</th>
                                    <th>Tolerancia</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Generated via JS -->
                            </tbody>
                        </table>
                    </div>
                </section>

                <section class="history-section glass-panel">
                    <div class="history-header">
                        <h2>Historial</h2>
                        <button type="button" id="btn-clear-history" class="btn btn-text">Borrar</button>
                    </div>
                    <ul id="history-list" class="history-list">
                        <li class="empty-history">No hay cálculos aún.</li>
                    </ul>
                </section>
            </aside>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
