<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Resistencias</title>
    <meta name="description" content="Aplicación para seleccionar colores de resistencias eléctricas">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Calculadora de Resistencias</h1>
            <p>HU-01: Selección de colores de resistencia</p>
        </header>

        <main class="calculator-section">
            <form id="resistor-form">
                <div class="band-group">
                    <label for="band1">Banda 1</label>
                    <select id="band1" class="color-select">
                        <option value="" disabled selected>Seleccione un color...</option>
                    </select>
                </div>

                <div class="band-group">
                    <label for="band2">Banda 2</label>
                    <select id="band2" class="color-select">
                        <option value="" disabled selected>Seleccione un color...</option>
                    </select>
                </div>

                <div class="band-group">
                    <label for="band4">Multiplicador</label>
                    <select id="band4" class="color-select">
                        <option value="" disabled selected>Seleccione un color...</option>
                    </select>
                </div>

                <div class="band-group">
                    <label for="band5">Tolerancia</label>
                    <select id="band5" class="color-select">
                        <option value="" disabled selected>Seleccione un color...</option>
                    </select>
                </div>
            </form>

            <section class="selection-summary">
                <h2>Colores seleccionados</h2>
                <p id="summary-text">Aún no se seleccionaron todos los colores.</p>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
